name: Sync HubSpot Resources

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Packages
        run: npm install

      - name: Create .env
        run: |
          echo HUBSPOT_TOKEN=${{ secrets.HUBSPOT_TOKEN }} > .env

      - name: Run Sync
        run: node index.js

      - name: Commit resources.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/resources.json

          git diff --cached --quiet || (
            git commit -m "Auto update resources.json"
            git push
          )